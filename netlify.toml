[build]
  base    = "app"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback so direct links to /margin, /refinery, etc. don't 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Long-cache the immutable hashed assets Vite emits
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
